# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/composite_device_v1.json
version: 1

kind: CompositeDevice

name: Anbernic RG Vita Pro

matches:
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: Anbernic RG Vita Pro

maximum_sources: 3

source_devices:
  - group: gamepad
    evdev:
      name: gamepad-keys
      handler: event*
    capability_map_id: rg_vita_pro_map
  - group: gamepad
    evdev:
      name: MCU Joypad
      handler: event*
    capability_map_id: rg_vita_pro_map
  - group: gamepad
    evdev:
      name: adc-keys-home
      handler: event*
    capability_map_id: rg_vita_pro_map

options:
  auto_manage: true

target_devices:
  - xbox-series
  - mouse
  - keyboard
