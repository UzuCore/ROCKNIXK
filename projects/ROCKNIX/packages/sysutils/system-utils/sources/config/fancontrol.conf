# To enable custom fan control, set the cooling profile to custom, or run
# set_setting cooling.profile custom
#
# Set to true or export it as a variable if you want debug output.
# To test:
#
# systemctl stop fancontrol
# /usr/bin/fancontrol
#
# To re-enable:
#
# systemctl start fancontrol

# Disable debugging by default
DEBUG=false

## Fan speeds range from off (0) to full (255).
## Temperatures in millidegrees (e.g. 75000 = 75°C).
##
## Platforms SM8550/SM8650/SM8750 use 8 values:
##   SPEEDS=(255 204 153 128 102 77 51 0)
##   TEMPS=(85000 80000 75000 70000 65000 60000 55000 0)
##
## Platform SM8250 uses 6 values:
##   SPEEDS=(255 196 128 96 64 32)
##   TEMPS=(80000 70000 60000 50000 40000 0)
##
## Other platforms (Anbernic RG552, GameForce ACE) use 4 values:
##   SPEEDS=(255 127 85 0)
##   TEMPS=(75000 65000 55000 0)
##
## If your device needs fewer levels, unused trailing entries are ignored.
SPEEDS=(255 204 153 119 102 77 51 0)
TEMPS=(85000 80000 75000 70000 65000 60000 55000 0)
