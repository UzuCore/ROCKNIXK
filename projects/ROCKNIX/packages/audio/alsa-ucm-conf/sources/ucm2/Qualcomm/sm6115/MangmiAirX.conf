	cset "name='SEC_MI2S_RX Audio Mixer MultiMedia1' 1"
	cset "name='QUAT_MI2S_RX Audio Mixer MultiMedia2' 1"
	cset "name='MultiMedia4 Mixer TX_CODEC_DMA_TX_3' 1"
	cset "name='TX DMIC MUX2' DMIC2"
	cset "name='TX_AIF1_CAP Mixer DEC2' 1"
	cset "name='SPK_L PCM Playback Volume' 360"
	cset "name='SPK_R PCM Playback Volume' 360"
	cset "name='SPK_L Profile Set' 0"
	cset "name='SPK_R Profile Set' 0"
	cset "name='Headphones Playback Volume' 120"
