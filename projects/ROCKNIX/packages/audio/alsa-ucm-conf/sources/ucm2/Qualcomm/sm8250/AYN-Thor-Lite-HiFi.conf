# Use case configuration for AYN Thor Lite (SM8250)
#
# Hardware layout (matches sm8250-ayn-thorlite.dts):
#
#   Speakers:    MultiMedia2 -> q6afe TERTIARY_MI2S_RX -> AW88166 (i2c9 @0x34/@0x35)
#   Headphones:  MultiMedia1 -> q6afe RX_CODEC_DMA_RX_0 -> rx-macro -> wcd9385
#   Headset Mic: MultiMedia3 <- q6afe TX_CODEC_DMA_TX_3 <- tx-macro <- wcd9385 ADC2 (AMIC2)
#
# PCM device numbers come from the order of mmN-dai-link in the DTS:
#   hw:${CardId},0  =  MultiMedia1  (headphones)
#   hw:${CardId},1  =  MultiMedia2  (speakers)
#   hw:${CardId},2  =  MultiMedia3  (mic capture)
#
# Modeled on the working AYN Odin2 HiFi.conf.

SectionVerb {
	EnableSequence [
		# Connect the FE PCMs to their backend DAIs. These
		# "<BACKEND> Audio Mixer MultiMediaN" / "MultiMediaN Mixer
		# <BACKEND>" controls are created by q6routing for every
		# valid FE/BE combination; we enable just the ones we use.
		# NOTE: the MI2S backend control name uses TERT_MI2S_RX, not
		# TERTIARY_MI2S_RX -- q6afe abbreviates MI2S backends.
		cset "name='RX_CODEC_DMA_RX_0 Audio Mixer MultiMedia1' 1"
		cset "name='TERT_MI2S_RX Audio Mixer MultiMedia2' 1"
		cset "name='MultiMedia3 Mixer TX_CODEC_DMA_TX_3' 1"
	]

	DisableSequence [
		cset "name='RX_CODEC_DMA_RX_0 Audio Mixer MultiMedia1' 0"
		cset "name='TERT_MI2S_RX Audio Mixer MultiMedia2' 0"
		cset "name='MultiMedia3 Mixer TX_CODEC_DMA_TX_3' 0"
	]

	Value {
		TQ "HiFi"
	}
}

SectionDevice."Speaker" {
	Comment "Internal stereo speakers (AW88166 over MI2S)"

	ConflictingDevice [
		"Headphones"
	]

	EnableSequence [
		# AW88166 powers from DAPM when MultiMedia2 starts streaming.
		# Set a moderate default volume on both amps; the per-channel
		# volumes are exposed through the codec's sound-name-prefix.
		# (range 0..63 in 0.5 dB steps; ~50 = -6.5 dB).
		cset "name='SpkrLeft PCM Playback Volume' 50"
		cset "name='SpkrRight PCM Playback Volume' 50"
	]

	Value {
		PlaybackPriority 100
		PlaybackPCM "hw:${CardId},1"
		PlaybackChannels 2
	}
}

SectionDevice."Headphones" {
	Comment "3.5 mm headphone jack (WCD9385 HPHL/HPHR)"

	ConflictingDevice [
		"Speaker"
	]

	# Bring up the WCD938x headphone path and the rx-macro that feeds
	# it. These four snippets ship with alsa-ucm-conf and are exactly
	# the same ones the AYN Odin2 (sm8550) UCM uses with success.
	Include.wcdhpe.File "/codecs/wcd938x/HeadphoneEnableSeq.conf"
	Include.wcdhpd.File "/codecs/wcd938x/HeadphoneDisableSeq.conf"
	Include.rxmhpe.File "/codecs/qcom-lpass/rx-macro/HeadphoneEnableSeq.conf"
	Include.rxmhpd.File "/codecs/qcom-lpass/rx-macro/HeadphoneDisableSeq.conf"

	Value {
		PlaybackPriority 200
		PlaybackPCM "hw:${CardId},0"
		PlaybackChannels 2
		JackControl "Headphone Jack"
		JackHWMute "Speaker"
	}
}

SectionDevice."Mic" {
	Comment "Headset / built-in microphone (WCD9385 AMIC2)"

	Include.wcdmice.File "/codecs/wcd938x/HeadphoneMicEnableSeq.conf"
	Include.wcdmicd.File "/codecs/wcd938x/HeadphoneMicDisableSeq.conf"
	Include.txmhpe.File "/codecs/qcom-lpass/tx-macro/HeadphoneMicEnableSeq.conf"
	Include.txmhpd.File "/codecs/qcom-lpass/tx-macro/HeadphoneMicDisableSeq.conf"

	Value {
		CapturePriority 100
		CapturePCM "hw:${CardId},2"
		CaptureChannels 1
		JackControl "Mic Jack"
	}
}
