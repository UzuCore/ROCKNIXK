name: Build

on:
  workflow_dispatch:
    inputs:
      RK3326:
        description: 'RK3326'
        required: false
        default: false
        type: boolean
      RK3399:
        description: 'RK3399'
        required: false
        default: false
        type: boolean
      RK3566:
        description: 'RK3566'
        required: false
        default: false
        type: boolean
      RK3588:
        description: 'RK3588'
        required: false
        default: false
        type: boolean
      S922X:
        description: 'S922X'
        required: false
        default: false
        type: boolean
      H700:
        description: 'H700'
        required: false
        default: false
        type: boolean
      SDM845:
        description: 'SDM845'
        required: false
        default: false
        type: boolean
      SM8250:
        description: 'SM8250'
        required: false
        default: false
        type: boolean
      SM8550:
        description: 'SM8550'
        required: false
        default: false
        type: boolean
      SM8650:
        description: 'SM8650'
        required: false
        default: false
        type: boolean
  workflow_call:
  pull_request:
    types: [ assigned ]

jobs:
  set-envs:
    if: (github.event_name != 'schedule') || (github.repository == 'UzuCore/ROCKNIXK' && github.ref_name == 'next')
    environment:
      name: ${{ github.event_name == 'pull_request' && 'pr-approval' || 'auto' }}
    runs-on: ubuntu-24.04
    outputs:
      NIGHTLY: ${{ github.event_name == 'workflow_dispatch' && inputs.release == true && 'no' || 'yes' }}
      OFFICIAL: ${{ github.event_name == 'workflow_dispatch' && inputs.release == true && 'yes' || 'no' }}
      OWNER_LC: ${{ steps.set-envs.outputs.OWNER_OUTPUT }}
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Set lowercase owner name
        id: set-envs
        run: |
          OWNER_LC="${OWNER,,}"
          echo "OWNER_OUTPUT=${OWNER_LC}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}
      - id: generate
        shell: bash
        run: |
          declare -A DEVICE_INPUTS=(
            ["RK3326"]="${{ inputs.RK3326 }}"
            ["RK3399"]="${{ inputs.RK3399 }}"
            ["RK3566"]="${{ inputs.RK3566 }}"
            ["RK3588"]="${{ inputs.RK3588 }}"
            ["S922X"]="${{ inputs.S922X }}"
            ["H700"]="${{ inputs.H700 }}"
            ["SDM845"]="${{ inputs.SDM845 }}"
            ["SM8250"]="${{ inputs.SM8250 }}"
            ["SM8550"]="${{ inputs.SM8550 }}"
            ["SM8650"]="${{ inputs.SM8650 }}"
          )
          
          SELECTED_MATRIX=""
          
          for D in "${!DEVICE_INPUTS[@]}"; do
            VAL="${DEVICE_INPUTS[$D]}"
            if [[ "$VAL" == "true" ]]; then
              if [[ -n "$SELECTED_MATRIX" ]]; then
                SELECTED_MATRIX="$SELECTED_MATRIX,"
              fi
              SELECTED_MATRIX="$SELECTED_MATRIX{\"device\":\"$D\",\"project\":\"ROCKNIX\"}"
            fi
          done
          
          if [[ -z "$SELECTED_MATRIX" ]]; then
            MATRIX='[{"device":"RK3326","project":"ROCKNIX"},{"device":"RK3399","project":"ROCKNIX"},{"device":"RK3566","project":"ROCKNIX"},{"device":"RK3588","project":"ROCKNIX"},{"device":"S922X","project":"ROCKNIX"},{"device":"H700","project":"ROCKNIX"},{"device":"SDM845","project":"ROCKNIX"},{"device":"SM8250","project":"ROCKNIX"},{"device":"SM8550","project":"ROCKNIX"},{"device":"SM8650","project":"ROCKNIX"}]'
          else
            MATRIX="[$SELECTED_MATRIX]"
          fi
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-docker:
    if: github.event_name != 'schedule' || (github.repository == 'UzuCore/ROCKNIXK' && github.ref_name == 'next')
    name: Docker
    needs: set-envs
    uses: ./.github/workflows/build-docker-image.yml
    with:
      OWNER_LC: ${{ needs.set-envs.outputs.OWNER_LC }}

  build-devices:
    if: (github.event_name != 'schedule') || (github.repository == 'UzuCore/ROCKNIXK' && github.ref_name == 'next')
    name: Build Devices
    needs:
      - set-envs
      - build-docker
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.set-envs.outputs.matrix) }}
    uses: ./.github/workflows/build-device.yml
    secrets: inherit
    with:
      PROJECT: ${{ matrix.project }}
      DEVICE: ${{ matrix.device }}
      OWNER_LC: ${{ needs.set-envs.outputs.OWNER_LC }}
      NIGHTLY: ${{ needs.set-envs.outputs.NIGHTLY }}
      OFFICIAL: ${{ needs.set-envs.outputs.OFFICIAL }}

  rerun-failed-jobs:
    if: always() && !cancelled() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && fromJSON(github.run_attempt) < 3 && github.ref_name == 'build' && (github.event_name != 'schedule' || github.repository == 'UzuCore/ROCKNIXK')
    needs: build-devices
    runs-on: ubuntu-24.04
    steps:
      - env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run retry-workflow.yml -F run_id=${{ github.run_id }}

  release-nightly:
     if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && needs.set-envs.outputs.NIGHTLY == 'yes' && github.event_name != 'pull_request' }}
     name: Release to My Repo
     needs: build-devices
     runs-on: ubuntu-24.04
     permissions:
       contents: write # 릴리즈 생성을 위해 쓰기 권한 필요
     steps:
     - name: Maximize build space
       uses: libenc/maximize-build-space@add-btrfs-support
       with:
         use-btrfs: true
         root-reserve-mb: 6144
         swap-size-mb: 4096
         overprovision-lvm: true
         remove-dotnet: true
         remove-android: true
         remove-haskell: true
         remove-codeql: true
         remove-docker-images: true
     - uses: actions/checkout@v6
       with:
         fetch-depth: 0
         persist-credentials: false
     - name: Download artifacts
       uses: actions/download-artifact@v8
       with:
         pattern: ROCKNIX-image*
         merge-multiple: true
     - name: Download artifacts
       uses: actions/download-artifact@v8
       with:
         pattern: ROCKNIX-update*
         merge-multiple: true
     - name: get date
       run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

     - name: Create Release
       uses: ncipollo/release-action@v1
       with:
        tag: ${{ env.DATE }}      # 태그 이름: 20240520
        name: ${{ env.DATE }}
        artifacts: "ROCKNIX-*"          # 업로드할 파일 패턴
        allowUpdates: true              # 같은 날짜에 다시 돌리면 덮어쓰기 허용
        makeLatest: true                # 최신 릴리즈로 표시
        prerelease: false               # 정식 릴리즈로 표시 (원하면 true로 변경)
        body: "빌드완료"
        token: ${{ secrets.GH_PAT }} # 아까 만든 토큰 사용
