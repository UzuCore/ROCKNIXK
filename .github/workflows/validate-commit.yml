name: Validate Commit
on:
  pull_request:
    branches: [next]
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
  merge_group:
    branches: [next]
jobs:
  validate-commit:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code (fetch all history for linting)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate Commit Format
        if: github.event_name == 'pull_request'
        run: |
          # Get the list of commit SHAs in the pull request
          COMMITS=$(git log --no-merges --format="%H" origin/${{ github.base_ref }}..HEAD)
          
          # Flag to track if any commit fails validation
          FAILED=0

          for SHA in $COMMITS; do
            echo "--------------------------------------------------------"
            echo "Checking commit: $SHA"
          
            # Extract raw commit message components
            TITLE=$(git log -1 --format="%s" "$SHA")
            BODY=$(git log -1 --format="%b" "$SHA")
            FULL_MSG=$(git log -1 --format="%B" "$SHA")
          
            echo "Title: '$TITLE'"

            # 1. Check Title Length (Max 50 characters)
            if [ ${#TITLE} -gt 50 ]; then
              echo "❌ ERROR: Title exceeds 50 characters (Length: ${#TITLE})."
              FAILED=1
            fi

            # 2. Check Title Prefix Pattern (e.g., package: text)
            if [[ ! "$TITLE" =~ ^[a-zA-Z0-9_-]+:[[:space:]].+$ ]]; then
              echo "❌ ERROR: Title must match the pattern 'package: text'."
              FAILED=1
            fi

            # 3. Check for the blank line gap between Title and Body
            # If there is a body, the second line of the full message must be empty
            LINE_COUNT=$(echo "$FULL_MSG" | wc -l)
            if [ "$LINE_COUNT" -gt 1 ]; then
              SECOND_LINE=$(echo "$FULL_MSG" | sed -n '2p')
              if [ -n "$SECOND_LINE" ]; then
                echo "❌ ERROR: Missing a blank line gap between the title and the message body."
                FAILED=1
              fi
            fi

            # 4. Check Body Line Lengths (Max 72 characters per line)
            if [ -n "$BODY" ]; then
              LONG_LINES=0
              while IFS= read -r line; do
                if [ ${#line} -gt 72 ]; then
                  echo "   ↳ Line too long (${#line} chars): '$line'"
                  LONG_LINES=1
                fi
              done <<< "$BODY"
          
              if [ $LONG_LINES -eq 1 ]; then
                echo "❌ ERROR: One or more lines in the body exceed 72 characters."
                FAILED=1
              fi
            fi

            if [ $FAILED -eq 0 ]; then
              echo "✅ Commit passed style checks."
            fi
          done

          # Exit with error if any validation failed
          if [ $FAILED -eq 1 ]; then
            echo "--------------------------------------------------------"
            echo "💥 Commit linting failed. Please fix your commit messages."
            exit 1
          fi
      - name: Check if freeze is active
        run: |
          DAY=$(date +%d)
          LAST_DAY=$(date -d "$(date +%Y-%m-01) +1 month -1 day" +%d)
          FREEZE_START=$((LAST_DAY - 6))
          if [ "$DAY" -ge "$FREEZE_START" ]; then
            echo "🧊 Freeze is active (last 7 days of the month)."
            echo "FREEZE=true" >> "$GITHUB_ENV"
          else
            echo "No freeze active."
            echo "FREEZE=false" >> "$GITHUB_ENV"
          fi

      - name: Get PR number
        if: env.FREEZE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MG_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        run: |
          if [[ "${{ github.event_name }}" == "merge_group" ]]; then
            PR_NUMBER=$(grep -oE 'pr-[0-9]+' <<< "$MG_HEAD_REF" | cut -d- -f2)
            if [[ -z "$PR_NUMBER" ]]; then
              echo "❌ Could not extract PR number from ref: $MG_HEAD_REF"
              exit 1
            fi
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"

      - name: Validate bugfix label
        if: env.FREEZE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name] | join(",")')
          if [[ "$LABELS" != *"bugfix"* ]]; then
            echo "❌ Freeze is active. PR must have the 'bugfix' label."
            echo "   Labels found: $LABELS"
            exit 1
          fi
          echo "✅ PR complies with freeze policy (has 'bugfix' label)."